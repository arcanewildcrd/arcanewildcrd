<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - UCU Eats</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar"><!-- Same nav --></nav>

  <section class="contact-hero">
    <div class="container">
      <h1 class="page-title">Contact Us</h1>
      <p class="page-subtitle">Get in touch for orders or vendor inquiries</p>
    </div>
  </section>

  <section class="contact-content">
    <div class="container">
      <div class="contact-grid">
        <div class="contact-info">
          <h3>📞 Quick Contact</h3>
          <div class="contact-item">
            <strong>Phone:</strong> 0772 123 456
          </div>
          <div class="contact-item">
            <strong>Email:</strong> hello@ucueats.com
          </div>
          <div class="contact-item">
            <strong>Location:</strong> Mukono University Area
          </div>
          <div class="contact-item">
            <strong>Hours:</strong> 7AM - 11PM Daily
          </div>
        </div>
        <form class="contact-form">
          <input type="text" placeholder="Your Name" required>
          <input type="email" placeholder="Your Email" required>
          <textarea placeholder="Your Message" rows="5" required></textarea>
          <button type="submit" class="btn-primary">Send Message</button>
        </form>
      </div>
    </div>
  </section>

  <footer class="footer"><!-- Same footer --></footer>
  <script src="script.js"></script>
</body>
</html>
